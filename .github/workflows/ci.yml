name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  phase-1-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Run public safety scan
        run: pnpm public-safe

      - name: Run public safety regression tests
        run: bash scripts/test-check-public-safe.sh

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Check formatting
        run: pnpm format

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Coverage
        run: pnpm test:coverage

      - name: Validate CI and setup docs
        run: pnpm ci:docs:test

      - name: Validate governance docs
        run: pnpm governance:docs:test

      - name: Enforce Phase 1 shell-only scope
        run: pnpm phase1:scope

      - name: Validate Compose smoke script
        run: pnpm compose:smoke:test

      - name: Run Compose smoke
        run: pnpm compose:smoke
